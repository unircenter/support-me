<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все будет хорошо — Твой карманный друг</title>
    <style>
        /* Мягкие, успокаивающие цвета и красивый дизайн */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #0c4a6e;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 25px;
        }
        /* Визуальный индикатор батарейки */
        .battery-box {
            display: inline-flex;
            align-items: center;
            background-color: #f1f5f9;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            color: #0f766e;
            margin-bottom: 20px;
        }
        .battery-icon {
            margin-right: 8px;
            font-size: 18px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        textarea:focus {
            border-color: #38bdf8;
        }
        button {
            background-color: #0ea5e9;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0284c7;
        }
        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }
        .response-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8fafc;
            border-left: 4px solid #38bdf8;
            border-radius: 4px 12px 12px 4px;
            text-align: left;
            min-height: 50px;
            display: none;
            line-height: 1.5;
        }
        /* Блок оплаты, если батарейка села */
        .pay-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 12px;
        }
        .pay-btn {
            background-color: #ef4444;
            margin-top: 10px;
        }
        .pay-btn:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Все будет хорошо</h1>
    <p class="subtitle">Поделись тем, что тебя тревожит. Я здесь, чтобы выслушать.</p>
    
    <!-- Батарейка лимитов -->
    <div class="battery-box">
        <span class="battery-icon">🔋</span> Заряд поддержки: <span id="limit-count">15</span>/15
    </div>

    <textarea id="user-input" placeholder="Напиши сюда свои мысли..."></textarea>
    <button id="send-btn" onclick="askAI()">Поделиться</button>

    <!-- Окно ответа ИИ -->
    <div id="response" class="response-box"></div>

    <!-- Окно покупки, если лимит исчерпан -->
    <div id="pay-zone" class="pay-box">
        <p style="color: #991b1b; margin: 0; font-size: 14px;">Ваша батарейка разрядилась. Она обновится завтра бесплатно, или вы можете зарядить её прямо сейчас.</p>
        <!-- Сюда в будущем вставим вашу ссылку на оплату -->
        <button class="pay-btn" onclick="window.open('https://yoomoney.ru&', '_blank')">Зарядить за 30 руб.</button>
    </div>
</div>

<script>
    // Инициализация лимитов в памяти браузера
    let maxLimits = 15;
    let currentLimits = localStorage.getItem('ai_limits') !== null ? parseInt(localStorage.getItem('ai_limits')) : maxLimits;
    
    // Функция обновления экрана
    function updateUI() {
        document.getElementById('limit-count').innerText = currentLimits;
        if (currentLimits <= 0) {
            document.getElementById('user-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('pay-zone').style.display = 'block';
        }
    }
    updateUI();

    // Функция отправки сообщения в ProxyAPI
    async function askAI() {
        const text = document.getElementById('user-input').value.trim();
        if (!text) return alert("Пожалуйста, напиши что-нибудь.");
        
        const responseBox = document.getElementById('response');
        const sendBtn = document.getElementById('send-btn');
        
        sendBtn.disabled = true;
        sendBtn.innerText = "Ищу нужные слова...";
        responseBox.style.display = "block";
        responseBox.innerText = "Слушаю тебя...";

        try {
            // Запрос к ProxyAPI (используем быструю и недорогую модель gpt-4o-mini)
            const response = await fetch('https://openai.api.proxyapi.ru/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer sk-MxrX305sh2mHt5FW9TP7khb2Uf5VbpKZ'
                },
                body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: [
                        {
                            role: 'system', 
                            content: 'Ты — самый добрый, чуткий и поддерживающий друг на свете. Твоя единственная цель — выслушать пользователя, снять его тревогу и успокоить. Что бы тебе ни написали (грусть, страх, усталость, проблемы), отвечай мягко, с огромным пониманием и теплом. Используй короткие, понятные предложения. Не давай заумных советов, если тебя не просят. Просто побудь рядом. Каждое свое сообщение обязательно заканчивай мягким напоминанием о том, что всё будет хорошо, и вы со всем справитесь.'
                        },
                        { role: 'user', content: text }
                    ]
                })
            });

            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            
            // Выводим ответ на экран
            responseBox.innerText = aiReply;
            
            // Списываем 1 заряд батарейки
            currentLimits--;
            localStorage.setItem('ai_limits', currentLimits);
            updateUI();

            // Очищаем поле ввода
            document.getElementById('user-input').value = "";

        } catch (error) {
            responseBox.innerText = "Ой, что-то пошло не так. Попробуй еще раз, я рядом.";
            console.error(error);
        } finally {
            if (currentLimits > 0) {
                sendBtn.disabled = false;
                sendBtn.innerText = "Поделиться";
            }
        }
    }
</script>

</body>
</html>
